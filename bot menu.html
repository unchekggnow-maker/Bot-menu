<!DOCTYPE html>
<html>
<head>
    <title>Menu Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<script>
    // Mengirim perintah /start ke bot saat WebApp terbuka
    Telegram.WebApp.sendData("/start");
    // Menutup WebApp setelah mengirim
    Telegram.WebApp.close();
</script>
</body>
</html>
